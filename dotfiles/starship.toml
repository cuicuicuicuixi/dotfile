# ---- 全局 ----
add_newline = false
command_timeout = 1000
format = "$env_var$username[@](bold red)$hostname$directory$git_status$git_branch"

# ---- 提示符字符 ----
[character]
success_symbol = "[](238)"
error_symbol = "[](238)"

# ---- 发行版图标（由 zshrc 注入 STARSHIP_DISTRO） ----
[env_var.STARSHIP_DISTRO]
format = '[$env_value](bold white)'
variable = "STARSHIP_DISTRO"
disabled = false

# ---- 用户名 ----
[username]
style_user = "white"
format = "[${user}]($style)"
disabled = false
show_always = true

# ---- 主机名 ----
[hostname]
ssh_only = false
format = "[$hostname](white) "
disabled = false

# ---- 本地 IP ----
[localip]
ssh_only = true
format = "[@ $localipv4](bold italic red) "
disabled = false

# ---- 退出状态码 ----
[status]
style = "bold green"
symbol = ""
success_symbol = ""
not_found_symbol = ""
not_executable_symbol = ""
format = '[$symbol]($style) '
map_symbol = true
disabled = false

# ---- 目录 ----
[directory]
truncation_length = 1
home_symbol = "~"
style = "bold cyan"
read_only_style = "197"
read_only = "  "
format = "[➜](bold green) [$path]($style)[$read_only]($read_only_style) "

# ---- Git 分支 ----
[git_branch]
symbol = ""
format = "[$symbol](yellow) [$branch]($style)[\\)](blue) "
truncation_symbol = "/"
style = "purple"

# ---- Git 状态 ----
[git_status]
format = '[\(](blue)[$all_status$ahead_behind]($style)'
style = "bold purple"

# ---- 填充 ----
[fill]
symbol = " "

# ---- Python ----
[python]
format = " [$symbol($version(-$name) )]($style)"
symbol = " "
python_binary = "python3"

# ---- Node.js ----
[nodejs]
format = " [ $version](bold green) "
disabled = true

# ---- C/C++ ----
[c]
format = " [$symbol($version(-$name) )]($style)"
symbol = " "
detect_extensions = ["c", "h", "cpp", "hpp"]
detect_folders = ["src"]
style = "bold blue"

# ---- Lua ----
[lua]
format = " [$symbol($version(-$name) )]($style)"
symbol = " "
